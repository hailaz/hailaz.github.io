<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>UI Design Guide — 小程序设计工作台</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>

<div class="app">

  <!-- Top Bar -->
  <header class="topbar">
    <span class="brand">🎨 ui-design-guide · 小程序设计工作台</span>

    <div class="topbar-group">
      <label>主题:
        <select id="preset-select">
          <option value="weui-light">🟢 WeUI 亮色</option>
          <option value="weui-dark">🟢 WeUI 暗色</option>
          <option value="default-light">default-light</option>
          <option value="default-dark">default-dark</option>
          <option value="apple-style">apple-style</option>
          <option value="material-style">material-style</option>
          <option value="minimal">minimal</option>
          <option value="cyberpunk">cyberpunk</option>
        </select>
      </label>
      <input id="vibe-input" type="text" placeholder="✨ Vibe: wechat / calm..." />
      <button class="tool" id="btn-apply-vibe">应用</button>
    </div>

    <button class="tool" id="btn-undo"    title="撤销 Ctrl+Z">↺</button>
    <button class="tool" id="btn-redo"    title="重做 Ctrl+Y">↻</button>

    <span class="grow"></span>

    <div class="topbar-group">
      <label>视口:
        <select id="device-select">
          <option value="miniprogram">📱 小程序</option>
          <option value="desktop">🖥 桌面</option>
        </select>
      </label>
      <button class="tool" id="btn-preview-theme" title="预览区明/暗">🌓</button>
    </div>

    <div class="topbar-group">
      <label class="tool" title="导入工程">📂 导入
        <input type="file" id="file-project" accept=".json" hidden />
      </label>
      <button class="tool"        id="btn-export-tokens" title="导出 tokens">⬇ Tokens</button>
      <button class="tool"        id="btn-export-brand"  title="导出 brand">⬇ Brand</button>
      <button class="tool primary" id="btn-export-project">⬇ 工程</button>
      <button class="tool primary" id="btn-export-code">&lt;/&gt; 代码</button>
      <button class="tool"        id="btn-project-manager" title="工程库（多工程管理）">📁 工程库</button>
      <button class="tool"        id="btn-screenshot" title="截图当前画布为 PNG">📷 截图</button>
      <button class="tool"        id="btn-share" title="生成分享链接 / 扫码预览">🔗 分享</button>
      <button class="tool"        id="btn-ai" title="AI 生成页面">🤖 AI</button>
      <button class="tool"        id="btn-plugins" title="插件管理">🧩 插件</button>
      <button class="tool"        id="btn-collab" title="多人协作演示（BroadcastChannel）">👥 协作</button>
      <button class="tool"        id="btn-lang" title="Switch Language / 切换语言">🌐 EN</button>
      <button class="tool"        id="btn-shell-theme" title="切换工作台主题（与预览主题分离）">🌙</button>
      <button class="tool"        id="btn-reset" title="重置">♻</button>
    </div>
  </header>

  <!-- Pages Tab -->
  <div class="pages-bar" id="pages-bar"></div>

  <!-- Body 5 栏：组件库 / 节点树 / 画布 / 属性 / Vibe+色板 -->
  <div class="body">

    <!-- L1 组件库 -->
    <aside class="panel left-1">
      <div class="panel-header">组件库</div>
      <input id="comp-search" class="panel-search" placeholder="搜索组件..." />
      <div id="components-sidebar" class="scroll"></div>
    </aside>

    <!-- L2 节点树 + 页面缩略 -->
    <aside class="panel left-2">
      <div class="panel-header">节点树</div>
      <div id="node-tree" class="scroll"></div>
    </aside>

    <!-- C 画布 -->
    <main class="panel center">
      <div class="preview-area" data-device="miniprogram">
        <div id="preview-root">
          <div class="mp-simulator">
            <!-- 状态栏 -->
            <div class="mp-statusbar">
              <span class="time" id="mp-time">9:41</span>
              <div class="icons">
                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z"/></svg>
                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
              </div>
            </div>
            <!-- 画布内容：直接由组件树渲染 -->
            <div class="mp-content" id="mp-content"></div>
          </div>
          <div class="canvas-overlay" id="canvas-overlay"></div>
        </div>
      </div>
    </main>

    <!-- R1 属性面板 -->
    <aside class="panel right-1">
      <div class="panel-header">属性</div>
      <div id="props-panel" class="scroll"></div>
    </aside>

    <!-- R2 Vibe 面板 -->
    <aside class="panel right-2">
      <div class="panel-header">Vibe 风格</div>
      <div class="panel-content scroll">
        <div id="vibe-tags" class="vibe-grid"></div>
        <div id="vibe-hint" class="hint"></div>
      </div>
    </aside>
  </div>

  <footer class="footer muted">
    拖拽组件到画布 · 点击选中编辑 · Del 删除 · Ctrl+Z 撤销 · Ctrl+D 复制 · 自动保存到浏览器 IndexedDB
    <span id="validation" class="validation"></span>
  </footer>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
